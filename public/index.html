<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="My Tracker — Personal tracking application" />

  <title>My Tracker</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>

  <div id="app">

    <header class="top-nav" aria-label="Main navigation">
      <a href="#/dashboard" class="nav-link" data-routes="dashboard">
        <span class="nav-icon" aria-hidden="true"><i class="bi bi-house-door"></i></span>
        <span class="nav-label">Home</span>
      </a>
      <a href="#/history" class="nav-link" data-routes="history">
        <span class="nav-icon" aria-hidden="true"><i class="bi bi-clock-history"></i></span>
        <span class="nav-label">History</span>
      </a>
      <a href="#/stats" class="nav-link" data-routes="stats">
        <span class="nav-icon" aria-hidden="true"><i class="bi bi-bar-chart-line"></i></span>
        <span class="nav-label">Stats</span>
      </a>
      <a href="#/settings" class="nav-link" data-routes="settings|types|groups|tags|challenges">
        <span class="nav-icon" aria-hidden="true"><i class="bi bi-sliders"></i></span>
        <span class="nav-label">Settings</span>
      </a>
    </header>

    <main id="view-container" class="view-container">
      <!-- Views are rendered here by the router -->
      <div class="loading-screen">
        <span class="loading-spinner"></span>
        <p>Loading...</p>
      </div>
    </main>

  </div><!-- #app -->

  <!-- Environment injected by the server -->
  <script src="./env.js"></script>

  <!-- Application -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
