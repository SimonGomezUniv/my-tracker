<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="My Tracker — Application de tracking d'informations" />

  <title>My Tracker</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>

  <div id="app">

    <header class="top-nav" aria-label="Navigation principale">
      <a href="#/dashboard" class="nav-link" data-routes="dashboard">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="#/history" class="nav-link" data-routes="history">
        <span class="nav-icon" aria-hidden="true">🕘</span>
        <span class="nav-label">Historique</span>
      </a>
      <a href="#/stats" class="nav-link" data-routes="stats">
        <span class="nav-icon" aria-hidden="true">📊</span>
        <span class="nav-label">Statistique</span>
      </a>
      <a href="#/settings" class="nav-link" data-routes="settings|types|groups|tags">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span class="nav-label">Paramètre</span>
      </a>
    </header>

    <main id="view-container" class="view-container">
      <!-- Les vues sont injectées ici par le router -->
      <div class="loading-screen">
        <span class="loading-spinner"></span>
        <p>Chargement…</p>
      </div>
    </main>

  </div><!-- #app -->

  <!-- Environnement injecté par le serveur -->
  <script src="./env.js"></script>

  <!-- Application -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
